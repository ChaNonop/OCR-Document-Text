<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OCR Scanner</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-6 space-y-6">

    <!-- Title -->
    <div class="text-center">
      <h1 class="text-2xl font-bold text-slate-800">Document OCR</h1>
      <p class="text-sm text-slate-500">Upload JPG, JPEG, or PDF</p>
    </div>

    <!-- Upload Area -->
    <div id="dropArea"
      class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center cursor-pointer hover:border-indigo-500 transition">
      <p class="text-slate-500">Drag & Drop or Click to Upload</p>
      <p class="text-xs text-slate-400 mt-1">Supports .jpg, .jpeg, .pdf</p>
      <input type="file" id="fileInput" class="hidden" accept=".jpg,.jpeg,.pdf">
    </div>

    <!-- Button -->
    <button id="uploadBtn"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
      Upload & Scan
    </button>

    <!-- Loading -->
    <div id="loading" class="hidden text-center">
      <div class="loader mx-auto mb-2"></div>
      <p class="text-slate-500">Processing...</p>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="hidden space-y-4">
      <h2 class="text-lg font-semibold text-slate-700">Document Text</h2>

      <!-- Tags -->
      <div id="tags" class="flex flex-wrap gap-2"></div>

      <!-- Text Content -->
      <div id="textContent" class="max-h-60 overflow-y-auto bg-slate-50 p-4 rounded-lg text-sm text-slate-700"></div>
    </div>

  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white w-full max-w-lg rounded-xl p-6 space-y-4">
      <h2 class="text-lg font-semibold text-slate-800">Extracted Text</h2>

      <textarea id="modalText"
        class="w-full h-40 p-3 border rounded-lg text-sm"></textarea>

      <div class="flex justify-end gap-2">
        <button id="copyBtn"
          class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
          Copy Text
        </button>
        <button id="closeModal"
          class="bg-slate-300 px-4 py-2 rounded-lg hover:bg-slate-400">
          Close
        </button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
